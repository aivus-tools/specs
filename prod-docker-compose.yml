# Snapshot of ~/aivus/docker-compose.production.yml from go.aivus.co.
# Source of truth: Specs/deployment/install.sh (this snapshot is regenerated
# from there). Pull the live file after any server-side change to keep in sync.
# Values supplied via ~/aivus/.env (NOT committed).

version: '3.9'

volumes:
  postgres_data:
  redis_data:
  traefik_acme:
  pgadmin_data:
  databasus_data:

networks:
  aivus:
    driver: bridge

services:
  # ===========================================
  # Traefik - Reverse Proxy & SSL
  # ===========================================
  traefik:
    image: traefik:v2.11
    container_name: aivus_traefik
    restart: unless-stopped
    networks:
      - aivus
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/letsencrypt
      - $HOME/aivus/traefik.yml:/etc/traefik/traefik.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:17
    container_name: aivus_postgres
    restart: unless-stopped
    networks:
      - aivus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # pgAdmin - Database Management
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aivus_pgadmin
    restart: unless-stopped
    networks:
      - aivus
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      # Optional: Add basic auth on top of pgadmin's auth if needed
      # - "traefik.http.routers.pgadmin.middlewares=pgadmin-auth"
      # - "traefik.http.middlewares.pgadmin-auth.basicauth.users=${PGADMIN_BASIC_AUTH}"

      # ===========================================
      # Redis Cache & Celery Broker
      # ===========================================
  redis:
    image: redis:7-alpine
    container_name: aivus_redis
    restart: unless-stopped
    networks:
      - aivus
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Django Backend
  # ===========================================
  django:
    # No container_name on purpose: `docker rollout` scales this service to 2
    # during deploy (old + new coexist until the new one is healthy), and a fixed
    # container_name forbids scaling > 1. Re-adding it brings back deploy downtime.
    image: ghcr.io/aivus-tools/backend-py:${BACKEND_TAG:-latest}
    restart: unless-stopped
    networks:
      - aivus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /start
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/healthz', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      # Django Core
      DJANGO_DEBUG: "False"
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${APP_DOMAIN},www.${APP_DOMAIN},api.${SERVICE_DOMAIN},django,localhost,127.0.0.1
      DJANGO_ADMIN_URL: ${DJANGO_ADMIN_URL}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-True}

      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CONN_MAX_AGE: 60

      # Redis
      REDIS_URL: redis://redis:6379/0

      DJANGO_DEFAULT_FROM_EMAIL: ${DJANGO_DEFAULT_FROM_EMAIL}
      DJANGO_SERVER_EMAIL: ${DJANGO_SERVER_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}

      # GCP Storage
      DJANGO_GCP_STORAGE_BUCKET_NAME: ${DJANGO_GCP_STORAGE_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-credentials.json

      # Sentry
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}

      # HMAC & API
      HMAC_SECRET: ${HMAC_SECRET}
      API_KEY: ${API_KEY}
      WIX_WEBHOOK_SECRET: ${WIX_WEBHOOK_SECRET}

      # LLM (Vertex AI / Gemini)
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      VERTEX_CREDENTIALS_PATH: /app/vertex-credentials.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Speech-to-Text
      STT_MODEL: ${STT_MODEL:-short}
      GOOGLE_CLOUD_SPEECH_LOCATION: ${GOOGLE_CLOUD_SPEECH_LOCATION:-global}

      # Frontend URL
      FRONTEND_URL: https://${APP_DOMAIN}
    volumes:
      # Mount GCP credentials if using service account JSON
      - ${GCP_CREDENTIALS_PATH}:/app/gcp-credentials.json:ro
      - ${VERTEX_CREDENTIALS_PATH}:/app/vertex-credentials.json:ro
    labels:
      - "traefik.enable=true"
      # Django on api.aivus.co - all routes (API, Admin, Static)
      - "traefik.http.routers.django.rule=Host(`api.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls.certresolver=letsencrypt"
      - "traefik.http.services.django.loadbalancer.server.port=5000"
      # Active healthcheck: Traefik stops routing to a container until /healthz
      # returns 200, so during a rollout the booting new container never gets
      # traffic. hostname must be in DJANGO_ALLOWED_HOSTS (Traefik otherwise sends
      # the container IP as Host and Django answers 400 -> backend looks unhealthy).
      - "traefik.http.services.django.loadbalancer.healthcheck.path=/healthz"
      - "traefik.http.services.django.loadbalancer.healthcheck.interval=5s"
      - "traefik.http.services.django.loadbalancer.healthcheck.timeout=3s"
      - "traefik.http.services.django.loadbalancer.healthcheck.hostname=api.${SERVICE_DOMAIN}"

  # ===========================================
  # Celery Worker
  # ===========================================
  celeryworker:
    image: ghcr.io/aivus-tools/backend-py:${BACKEND_TAG:-latest}
    container_name: aivus_celeryworker
    restart: unless-stopped
    # On deploy, give Celery's warm shutdown time to finish in-flight tasks before
    # SIGKILL (CELERY_TASK_TIME_LIMIT=300s). The default 10s kills long AI tasks
    # (brief finalization etc.) mid-run, and with acks_late off they are lost.
    stop_grace_period: 300s
    networks:
      - aivus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /start-celeryworker
    environment:
      # Inherit all Django environment variables
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ADMIN_URL: ${DJANGO_ADMIN_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      RESEND_API_KEY: ${RESEND_API_KEY}
      DJANGO_GCP_STORAGE_BUCKET_NAME: ${DJANGO_GCP_STORAGE_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-credentials.json
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      HMAC_SECRET: ${HMAC_SECRET}
      API_KEY: ${API_KEY}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      VERTEX_CREDENTIALS_PATH: /app/vertex-credentials.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Speech-to-Text
      STT_MODEL: ${STT_MODEL:-short}
      GOOGLE_CLOUD_SPEECH_LOCATION: ${GOOGLE_CLOUD_SPEECH_LOCATION:-global}
      FRONTEND_URL: https://${APP_DOMAIN}
    volumes:
      - ${GCP_CREDENTIALS_PATH}:/app/gcp-credentials.json:ro
      - ${VERTEX_CREDENTIALS_PATH}:/app/vertex-credentials.json:ro

  # ===========================================
  # Celery Beat (Scheduler)
  # ===========================================
  celerybeat:
    image: ghcr.io/aivus-tools/backend-py:${BACKEND_TAG:-latest}
    container_name: aivus_celerybeat
    restart: unless-stopped
    networks:
      - aivus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /start-celerybeat
    environment:
      # Inherit all Django environment variables
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ADMIN_URL: ${DJANGO_ADMIN_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      RESEND_API_KEY: ${RESEND_API_KEY}
      DJANGO_GCP_STORAGE_BUCKET_NAME: ${DJANGO_GCP_STORAGE_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-credentials.json
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      HMAC_SECRET: ${HMAC_SECRET}
      API_KEY: ${API_KEY}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      VERTEX_CREDENTIALS_PATH: /app/vertex-credentials.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Speech-to-Text
      STT_MODEL: ${STT_MODEL:-short}
      GOOGLE_CLOUD_SPEECH_LOCATION: ${GOOGLE_CLOUD_SPEECH_LOCATION:-global}
    volumes:
      - ${GCP_CREDENTIALS_PATH}:/app/gcp-credentials.json:ro
      - ${VERTEX_CREDENTIALS_PATH}:/app/vertex-credentials.json:ro

  # ===========================================
  # Flower - Celery Monitoring
  # ===========================================
  flower:
    image: ghcr.io/aivus-tools/backend-py:${BACKEND_TAG:-latest}
    container_name: aivus_flower
    restart: unless-stopped
    networks:
      - aivus
    depends_on:
      redis:
        condition: service_healthy
    command: /start-flower
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ADMIN_URL: ${DJANGO_ADMIN_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DJANGO_GCP_STORAGE_BUCKET_NAME: ${DJANGO_GCP_STORAGE_BUCKET_NAME}
      RESEND_API_KEY: ${RESEND_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
      # Basic auth for Flower
      - "traefik.http.routers.flower.middlewares=flower-auth"
      - "traefik.http.middlewares.flower-auth.basicauth.users=${FLOWER_BASIC_AUTH}"

  # ===========================================
  # Databasus - PostgreSQL Backup & Monitoring
  # ===========================================
  databasus:
    image: databasus/databasus:v3.32.2
    container_name: aivus_databasus
    restart: unless-stopped
    networks:
      - aivus
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - databasus_data:/databasus-data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.databasus.rule=Host(`databasus.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.databasus.entrypoints=websecure"
      - "traefik.http.routers.databasus.tls.certresolver=letsencrypt"
      - "traefik.http.services.databasus.loadbalancer.server.port=4005"

  # ===========================================
  # Next.js Frontend
  # ===========================================
  frontend:
    # No container_name on purpose: docker rollout scales this service to 2 during
    # deploy (old + new coexist until the new one is healthy); a fixed name forbids
    # scaling > 1. Re-adding it brings back deploy downtime on go.aivus.co.
    image: ghcr.io/aivus-tools/frontend:${FRONTEND_TAG:-latest}
    restart: unless-stopped
    networks:
      - aivus
    depends_on:
      - django
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      # Next.js
      NODE_ENV: development

      # API Connection
      API_URL: http://django:5000
      CALLBACK_URL: https://${APP_DOMAIN}
      NEXTAUTH_URL: https://${APP_DOMAIN}

      # NextAuth
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_TRUST_HOST: "true"

      # HMAC (must match Django)
      HMAC_SECRET: ${HMAC_SECRET}

      # Debug
      DEBUG: ${FRONTEND_DEBUG:-false}
    labels:
      - "traefik.enable=true"
      # Frontend on go.aivus.co - all routes
      - "traefik.http.routers.frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # Active healthcheck: Traefik routes only to a container serving /api/health
      # (200), so during a rollout the booting new container never gets traffic.
      - "traefik.http.services.frontend.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.frontend.loadbalancer.healthcheck.interval=5s"
      - "traefik.http.services.frontend.loadbalancer.healthcheck.timeout=3s"
      - "traefik.http.services.frontend.loadbalancer.healthcheck.hostname=${APP_DOMAIN}"
